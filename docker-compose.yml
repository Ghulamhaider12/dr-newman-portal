services:
  db:
    image: postgres:16-alpine
    container_name: dr_newman_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: dr_newman_portal
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d dr_newman_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dbdata:
